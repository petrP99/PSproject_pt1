<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Registration</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #e0f2f7 0%, #21f953 100%); /* Light blue to dark blue gradient */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            width: 100%;
        }

        .container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 450px; /* Increased max-width for a more modern look */
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15); /* More pronounced shadow */
            padding: 30px;
            background-color: #ffffff; /* White background for the card */
            animation: fadeIn 1s ease-out; /* Fade in animation for the card */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 25px;
            text-align: center;
            font-weight: bold;
        }

        .form-group label {
            text-align: left;
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
            outline: none;
        }

        .btn-1 {
            width: 100%;
            padding: 12px 0;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn-1:hover {
            transform: translateY(-3px);
        }

        .error-message {
            color: red;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .form-container {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark navbar-expand-md bg-dark py-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <a class="navbar-brand">
            <img alt="Logo"
                 class="d-inline-block align-text-top" height="32" src="https://www.freedownloadlogo.com/logos/p/photoshop-cc-7.svg" width="40">
            PSystem
        </a>
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 d-flex flex-row">
            <li class="nav-item">
                <a aria-current="page" class="nav-link active"><span th:text="#{home.Mypayments}">My payments</span></a>
            </li>
            <li class="nav-item">
                <a aria-current="page" class="nav-link active"><span
                        th:text="#{home.Mytransfers}">My transfers</span></a>
            </li>
            <li class="nav-item">
                <a aria-current="page" class="nav-link active"><span th:text="#{home.Myreplenishments}">My replenishments</span></a>
            </li>
            <li class="nav-item">
                <a aria-current="page" class="nav-link active"><span th:text="#{home.Mycards}">My cards</span></a>
            </li>
        </ul>

        <ul class="navbar-nav me-auto mb-2 mb-lg-0 d-flex flex-row">

            <form action="" class="dt-row-group center">
                <button class="btn btn-outline-light" name="lang" onchange="this.form.submit()" type="submit"
                        value="en">EN
                </button>
                <button class="btn btn-outline-light" name="lang" onchange="this.form.submit()" type="submit"
                        value="ru">RU
                </button>
            </form>
        </ul>
    </div>
</nav>
<div class="container">
    <div class="card">
        <div class="card-body">
            <h3 class="card-title">Registration</h3>
            <form method="post" th:action="@{/users}" th:object="${user}">
                <div class="form-group">
                    <label class="text-center" for="login">login:
                        <input class="form-control" id="login" name="login" placeholder="example@bk.ru" th:value="*{login}"
                               type="text">
                    </label>
                </div>
                <div class="form-group">
                    <label class="text-center" for="rawPassword">password:
                        <input class="form-control" id="rawPassword" name="rawPassword" placeholder="must not be empty"
                               type="password">
                    </label>
                </div>
                <div class="form-container text-center">
                    <button class="btn-1 btn btn-success" type="submit">Registration</button>
                </div>
            </form>
            <div class="form-container">
                <a href="/login">
                    <button class="btn-1 btn btn-dark" type="button">Login</button>
                </a>
            </div>
            <div th:if="${errors}">
                <p class="error-message" style="color: red" th:each="error : ${errors}" th:text="${error.defaultMessage}">Error
                    Message</p>
            </div>
        </div>
    </div>
</div>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
