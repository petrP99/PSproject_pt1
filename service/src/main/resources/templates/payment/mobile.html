<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Mobile pay</title>
    <link href="/webjars/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #deff4b 0%, #3682f4 100%); /* Orange to red gradient */
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientAnimation {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .navbar {
            width: 100%;
        }

        .container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            padding: 30px;
            background-color: #ffffff;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 25px;
            text-align: center;
            font-weight: bold;
        }

        .form-group label {
            text-align: left;
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input[type="text"],
        input[type="number"],
        .btn-1,
        .form-select {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        .form-select:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
            outline: none;
        }

        .btn-1 {
            width: 100%;
            padding: 12px 0;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn-1:hover {
            transform: translateY(-3px);
        }

        .error-message {
            color: red;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .user-balance {
            flex-grow: 1; /* Занимает все доступное пространство в строке */
            text-align: center; /* Выравнивание текста по центру */
            color: #02f833;
            font-size: large;
        }
    </style>
</head>
<header>
    <div th:insert="~{navbar :: navbar}"></div>
</header>
<body>
<div class="container">
    <div class="card">
        <div class="card-body">
            <h3 class="card-title">Pay for mobile</h3>
            <form method="post" th:action="@{/payments/create/mobile}" th:object="${payment}">
                <br>
                <img alt="headerImage" class="headerImage" src="https://www.paysera.com/v2/images/render/3114/3757"
                     style="width: 300px; display: block; margin: 0 auto;">
                <input id="clientId" name="clientId" th:value="${session.clientId}" type="hidden">
                <br>
                <div class="form-group row-cols-10">
                    <select aria-label="Default select example" class="form-select" id="cardId"
                            name="cardId"
                            style="outline-color: #af3bde">
                        <option th:each="card : ${cards}"
                                th:text="'Card №: ' + ${card.id()} +'  Balance: '+ ${card.balance()}"
                                th:value="${card.id()}">
                            Select card
                        </option>
                    </select>
                </div>
                <br>
                <input class="form-control-color" id="shopName" maxlength="11" name="shopName"
                       placeholder="phone number"
                       style="outline-color: #64edbd"
                       th:value="*{shopName}" type="number"><br>
                <input class="form-control-color" id="amount" min="0" name="amount"
                       pattern="[0-9]*"
                       placeholder="amount"
                       style="outline-color: mediumpurple" th:value="*{amount()}" type="number"><br>
                <div class="form-container text-center">
                    <button class="btn-1 btn btn-primary" type="submit">Pay!</button>
                </div>
            </form>
            <div th:if="${errors}">
                <p style="color: red" th:each="error : ${errors}" th:text="${error.defaultMessage}">Check amount</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
